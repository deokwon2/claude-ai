# ── Pane borders ──────────────────────────────────────────────
# All borders heavy + blue (same color). Active pane stands out
# via a reverse-video highlighted top label (acts as a visual
# "thicker" frame marker).
set -g pane-border-lines heavy
set -g pane-border-style        "fg=colour39"
set -g pane-active-border-style "fg=colour39,bold"

# Label shown at top of each pane. Uses the per-pane user option
# @role so existing setups stay compatible.
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=colour15#,bg=colour27#,bold] ━━ #{@role} ━━ ,#[fg=colour15#,bg=colour24] #{@role} }"

# ── Status bar (blue theme) ───────────────────────────────────
set -g status-style        "bg=colour17,fg=colour39"
set -g status-interval     5
# 왼쪽: 세션명 → 현재 폴더 → prefix 표시
set -g status-left         "#[fg=colour15,bg=colour27,bold] #S #[fg=colour27,bg=colour24,nobold]#[fg=colour15,bg=colour24] #{b:pane_current_path} #[fg=colour24,bg=colour17]#{?client_prefix,#[fg=colour196,bg=colour17,bold] ^B ,}"
set -g status-left-length  60
# 오른쪽: pane 수 → 시간/날짜
set -g status-right        "#[fg=colour24,bg=colour17]#[fg=colour39,bg=colour24] #{window_panes} panes #[fg=colour39,bg=colour24]#[fg=colour15,bg=colour39,bold] %H:%M  %d-%b "
set -g status-right-length 35

setw -g window-status-format          " #I:#W "
setw -g window-status-current-format  "#[fg=colour17,bg=colour39]#[fg=colour15,bg=colour39,bold] #I:#W #[fg=colour39,bg=colour17]"
setw -g window-status-style           "fg=colour15,bg=colour17"
setw -g window-status-current-style   "fg=colour15,bg=colour39,bold"
setw -g window-status-activity-style  "fg=colour226,bg=colour17"

# Message / command-prompt styling in blue tones.
set -g message-style         "bg=colour27,fg=colour15,bold"
set -g message-command-style "bg=colour17,fg=colour39"

# Display-panes numbers in matching palette.
set -g display-panes-colour        colour24
set -g display-panes-active-colour colour39
